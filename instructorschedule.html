<!DOCTYPE html>
<html lang="en">
<head>
<!-- sets the character encoding for the page-->
<meta charset="UTF-8">
<!--code allows the page to adapt to different screen sizes if it is-->
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!--Instructor schedule title-->
<title>Instructor Schedule</title>
<!--links styles.css to the page-->
<link rel="stylesheet" href="styles.css">
</head>
<body>
<!--Page header-->
<header>
<h1>Course Portal</h1>
</header>
<!--Allows users to navigate through hyperlinks between pages of the project-->
<nav>
<a href="">Home</a>
<a href="">Course Search</a>
<a href="">Student Registration</a>
<a href="instructorschedule.html">Instructor Schedule</a>
<a href="sessionenrollment.html">Enrollment</a>
</nav>
<div class="container">
<!--the insstructor login section of the page-->
<div class="login-box">

<h2>Instructor Login</h2>
<!--allows user to input username-->
<label>Username</label>
<input type="text" placeholder="Enter username">
<!--allows user to input password-->
<label>Password</label>
<input type="password" placeholder="Enter password">
<!--button to use to log in-->
<button>Login</button>
</div>
<!--instructor schedule table-->
<h2>My Teaching Schedule</h2>
<table>
<!--table headings-->
<tr>
<th>Course</th>
<th>Day</th>
<th>Time</th>
<th>Room</th>
</tr>
<!--rows for schedule information-->
<tr>
<td>INFO 465</td>
<td>Monday</td>
<td>10:30</td>
<td>Online</td>
</tr>
<!-- more rows for extra information-->
<tr>
<td>INFO 300</td>
<td>Tuesday</td>
<td>12:00</td>
<td>B102</td>
</tr>
</table>

</div>

</body>
</html>
